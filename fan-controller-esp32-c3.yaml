substitutions:
  name: "fan-controller"
  friendly_name: "Fan Controller"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.12.0
  name_add_mac_suffix: true
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: led_status
          effect: "Rainbow"

esp32:
  variant: ESP32C3
  framework:
    type: esp-idf

logger:
  level: DEBUG

# API is a requirement of the dashboard import
# Grab a key from https://esphome.io/components/api.html
api:
#   encryption:
#     key:

# OTA is required for Over-the-Air updating
ota:
  - platform: esphome
    # password: !secret ota_password

# WiFi is required
wifi:
#   ssid: !secret wifi_ssid
#   password: !secret wifi_password
#   use_address: xxx.xxx.xxx.xxx

# Allows user to provision WiFi credentials with Bluetooth using Improv standard
esp32_improv:
  authorizer: none

# Allow user to provision WiFi credentials with USB port using Improv standard
improv_serial:

output:
  - platform: ledc
    pin: GPIO1
    id: fan_pwm
    frequency: 25000Hz # Standard for 4-pin PWM fans

light:
  - platform: esp32_rmt_led_strip
    id: led_status
    rgb_order: RGB
    pin: GPIO21
    num_leds: 1
    chipset: ws2812
    effects:
      - addressable_rainbow:
      - addressable_rainbow:
          name: Rainbow
          speed: 10
          width: 50
fan:
  - platform: speed
    output: fan_pwm
    name: "Fan"
    restore_mode: RESTORE_DEFAULT_ON

sensor:
  - platform: pulse_counter
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
    name: "Fan RPM"
    unit_of_measurement: "RPM"
    icon: "mdi:fan"
    accuracy_decimals: 0
    filters:
      - multiply: 0.5
    update_interval: 10s
